<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWE TV Schedule</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <style>
    :root {
      --bwe-bg: #ffffff;
      --bwe-surface: #f8fafc;
      --bwe-text: #111827;
      --bwe-text-muted: #6b7280;
      --bwe-brand: #7c2d12;
      --bwe-brand-strong: #78350f;
      --bwe-primary: #dc2626;
      --bwe-primary-hover: #b91c1c;
      --bwe-accent: #2563eb;
      --bwe-accent-hover: #1d4ed8;
      --bwe-success: #16a34a;
      --bwe-success-hover: #15803d;
      --bwe-border: #d1d5db;
      --bwe-radius: 0.5rem;
      --bwe-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      --bwe-font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      font-family: var(--bwe-font-family);
      color: var(--bwe-text);
      line-height: 1.6;
    }

    h1, h2, h3, h4 {
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .mobile-menu {
      transition: all 0.3s ease;
    }
    .mobile-menu.hidden {
      max-height: 0;
      overflow: hidden;
    }
    .mobile-menu.visible {
      max-height: 300px;
    }

    .schedule-item {
      transition: all 0.3s ease;
      border-left: 4px solid #f87171;
    }
    .schedule-item:hover {
      background-color: #fef3c7;
      transform: translateX(4px);
    }

    .live-indicator {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--bwe-radius);
      padding: 0.625rem 1rem;
      font-weight: 700;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
      border: 1px solid transparent;
    }
    .btn:hover {
      transform: translateY(-1px);
    }
    .btn-primary { background: var(--bwe-primary); color: #fff; }
    .btn-primary:hover { background: var(--bwe-primary-hover); }
    .btn-secondary { background: #fff; color: var(--bwe-text); border-color: var(--bwe-border); }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-accent { background: var(--bwe-accent); color: #fff; }
    .btn-accent:hover { background: var(--bwe-accent-hover); }
    .btn-success { background: var(--bwe-success); color: #fff; }
    .btn-success:hover { background: var(--bwe-success-hover); }

    .brand-header { background: var(--bwe-brand); }
    .brand-header-sub { background: var(--bwe-brand-strong); }
    .section-surface { background: var(--bwe-surface); }
  </style>
</head>
<body class="bg-white text-black">

  <header class="brand-header text-white sticky top-0 z-50 shadow-lg">
    <div class="flex justify-between items-center p-4">
      <div class="text-2xl font-bold">BWE <span class="bg-red-600 px-2">TV</span></div>
      <nav class="hidden md:flex space-x-6">
        <a href="index.html" class="hover:text-yellow-200 transition">Home</a>
        <a href="schedule.html" class="hover:text-yellow-200 transition">Programs</a>
        <a href="shows.html" class="hover:text-yellow-200 transition">Shows</a>
        <a href="community.html" class="hover:text-yellow-200 transition">Community</a>
      </nav>
      <button id="mobileMenuBtn" class="md:hidden text-2xl hover:bg-yellow-800 p-2 rounded transition">☰</button>
    </div>

    <nav id="mobileMenu" class="mobile-menu hidden brand-header-sub md:hidden">
      <div class="flex flex-col p-4 space-y-3">
        <a href="index.html" class="hover:text-yellow-200 transition">Home</a>
        <a href="schedule.html" class="hover:text-yellow-200 transition">Programs</a>
        <a href="shows.html" class="hover:text-yellow-200 transition">Shows</a>
        <a href="community.html" class="hover:text-yellow-200 transition">Community</a>
      </div>
    </nav>
  </header>

  <section class="p-6 bg-gradient-to-r from-red-600 to-red-800 text-white text-center">
    <h2 class="text-2xl font-bold mb-4">On Air Now</h2>
    <div id="currentShowInfo" class="mb-6"><p class="text-lg font-semibold">Loading...</p></div>
    <div class="mb-4 max-w-4xl mx-auto">
      <video id="livePlayer" class="video-js vjs-default-skin w-full h-auto" controls autoplay preload="auto" data-setup='{"fluid": true, "aspectRatio": "16:9"}'>
        <source src="http://yourserverip:8080/live/streamkey.m3u8" type="application/x-mpegURL">
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>
    <button onclick="window.location.href='index.html'" class="btn btn-secondary">← Back to Home</button>
  </section>

  <section class="p-6 section-surface border-b">
    <div class="max-w-6xl mx-auto">
      <h3 class="text-lg font-bold mb-4 text-gray-700">Select Day</h3>
      <div class="flex flex-wrap gap-2">
        <button onclick="selectDay(event, 'Today')" class="day-btn btn btn-primary" data-day="today">Today</button>
        <button onclick="selectDay(event, 'Monday')" class="day-btn btn btn-secondary" data-day="monday">Monday</button>
        <button onclick="selectDay(event, 'Tuesday')" class="day-btn btn btn-secondary" data-day="tuesday">Tuesday</button>
        <button onclick="selectDay(event, 'Wednesday')" class="day-btn btn btn-secondary" data-day="wednesday">Wednesday</button>
        <button onclick="selectDay(event, 'Thursday')" class="day-btn btn btn-secondary" data-day="thursday">Thursday</button>
        <button onclick="selectDay(event, 'Friday')" class="day-btn btn btn-secondary" data-day="friday">Friday</button>
        <button onclick="selectDay(event, 'Saturday')" class="day-btn btn btn-secondary" data-day="saturday">Saturday</button>
        <button onclick="selectDay(event, 'Sunday')" class="day-btn btn btn-secondary" data-day="sunday">Sunday</button>
      </div>
    </div>
  </section>

  <section class="p-6 bg-white">
    <div class="max-w-6xl mx-auto">
      <h2 id="scheduleTitle" class="text-2xl text-red-600 mb-6 font-bold">Today's Schedule</h2>
      <div id="scheduleContainer" class="space-y-3"><div class="bg-gray-100 rounded p-4 h-20"></div></div>
      <div class="mt-8 flex flex-wrap gap-3 justify-center md:justify-start">
        <button onclick="setReminder()" class="btn btn-secondary">🔔 Set Reminder</button>
        <button onclick="shareSchedule()" class="btn btn-accent">Share Schedule</button>
        <button onclick="downloadSchedule()" class="btn btn-success">📥 Download</button>
      </div>
    </div>
  </section>

  <footer class="brand-header text-white text-center p-4 mt-8">
    <p>© 2026 BWE TV | <a href="#" class="hover:underline">About</a> | <a href="#" class="hover:underline">Privacy</a> | <a href="#" class="hover:underline">Contact</a></p>
    <div class="flex justify-center space-x-4 mt-2">
      <a href="#" class="hover:text-yellow-200 transition">Facebook</a>
      <a href="#" class="hover:text-yellow-200 transition">Twitter</a>
      <a href="#" class="hover:text-yellow-200 transition">YouTube</a>
      <a href="#" class="hover:text-yellow-200 transition">Instagram</a>
    </div>
  </footer>

  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script src="content.js"></script>
</body>
</html>
