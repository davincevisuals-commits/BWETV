<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWE TV Shows</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --bwe-bg: #ffffff;
      --bwe-surface: #f8fafc;
      --bwe-text: #111827;
      --bwe-text-muted: #6b7280;
      --bwe-brand: #7c2d12;
      --bwe-brand-strong: #78350f;
      --bwe-primary: #dc2626;
      --bwe-primary-hover: #b91c1c;
      --bwe-border: #d1d5db;
      --bwe-radius: 0.5rem;
      --bwe-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      --bwe-font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      font-family: var(--bwe-font-family);
      color: var(--bwe-text);
      line-height: 1.6;
    }

    h1, h2, h3, h4 {
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .mobile-menu {
      transition: all 0.3s ease;
    }
    .mobile-menu.hidden {
      max-height: 0;
      overflow: hidden;
    }
    .mobile-menu.visible {
      max-height: 300px;
    }

    .show-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .show-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }
    .show-card:hover .show-overlay {
      opacity: 1;
    }
    .show-overlay {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--bwe-radius);
      padding: 0.625rem 1rem;
      font-weight: 700;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
      border: 1px solid transparent;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--bwe-primary); color: #fff; }
    .btn-primary:hover { background: var(--bwe-primary-hover); }
    .btn-secondary { background: #fff; color: var(--bwe-text); border-color: var(--bwe-border); }
    .btn-secondary:hover { background: #f9fafb; }

    .category-filter.active {
      background-color: var(--bwe-primary);
      color: white;
      border-color: var(--bwe-primary);
    }

    .brand-header { background: var(--bwe-brand); }
    .brand-header-sub { background: var(--bwe-brand-strong); }
    .section-surface { background: var(--bwe-surface); }
  </style>
</head>
<body class="bg-white text-black">

  <header class="brand-header text-white sticky top-0 z-50 shadow-lg">
    <div class="flex justify-between items-center p-4">
      <div class="text-2xl font-bold">BWE <span class="bg-red-600 px-2">TV</span></div>
      <nav class="hidden md:flex space-x-6">
        <a href="index.html" class="hover:text-yellow-200 transition">Home</a>
        <a href="schedule.html" class="hover:text-yellow-200 transition">Programs</a>
        <a href="shows.html" class="hover:text-yellow-200 transition">Shows</a>
        <a href="community.html" class="hover:text-yellow-200 transition">Community</a>
      </nav>
      <button id="mobileMenuBtn" class="md:hidden text-2xl hover:bg-yellow-800 p-2 rounded transition">☰</button>
    </div>

    <nav id="mobileMenu" class="mobile-menu hidden brand-header-sub md:hidden">
      <div class="flex flex-col p-4 space-y-3">
        <a href="index.html" class="hover:text-yellow-200 transition">Home</a>
        <a href="schedule.html" class="hover:text-yellow-200 transition">Programs</a>
        <a href="shows.html" class="hover:text-yellow-200 transition">Shows</a>
        <a href="community.html" class="hover:text-yellow-200 transition">Community</a>
      </div>
    </nav>
  </header>

  <section class="p-6 bg-gradient-to-r from-red-600 to-red-800 text-white text-center">
    <h1 class="text-4xl font-bold mb-2">Our Shows</h1>
    <p class="text-lg opacity-90">Browse our complete catalog of engaging programs</p>
  </section>

  <section class="p-6 section-surface border-b">
    <div class="max-w-6xl mx-auto">
      <div class="mb-6">
        <input type="text" id="searchInput" placeholder="Search shows by title, host, or description..." class="w-full px-4 py-3 rounded border-2 border-gray-300 focus:border-red-600 focus:outline-none transition" oninput="filterShows()">
      </div>
      <div class="mb-4">
        <h3 class="text-sm font-bold text-gray-700 mb-3">Filter by Category</h3>
        <div class="flex flex-wrap gap-2">
          <button onclick="filterByCategory(event, 'All')" class="category-filter active btn btn-primary">All</button>
          <button onclick="filterByCategory(event, 'News')" class="category-filter btn btn-secondary">📰 News</button>
          <button onclick="filterByCategory(event, 'Culture')" class="category-filter btn btn-secondary">Culture</button>
          <button onclick="filterByCategory(event, 'Health')" class="category-filter btn btn-secondary">Health</button>
          <button onclick="filterByCategory(event, 'Education')" class="category-filter btn btn-secondary">Education</button>
          <button onclick="filterByCategory(event, 'Entertainment')" class="category-filter btn btn-secondary">Entertainment</button>
          <button onclick="filterByCategory(event, 'Business')" class="category-filter btn btn-secondary">Business</button>
        </div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-3">Sort by</h3>
        <select id="sortSelect" onchange="sortShows()" class="px-4 py-2 rounded border-2 border-gray-300 focus:border-red-600 focus:outline-none transition">
          <option value="rating">Rating (High to Low)</option>
          <option value="episodes">Episodes (Most to Least)</option>
          <option value="name">Name (A to Z)</option>
        </select>
      </div>
    </div>
  </section>

  <section class="p-6 bg-white">
    <div class="max-w-6xl mx-auto">
      <div id="resultsInfo" class="mb-4 text-gray-600 font-semibold">Loading shows...</div>
      <div id="showsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <div id="noResults" class="text-center py-12 hidden">
        <p class="text-2xl text-gray-500 mb-4">No shows found</p>
        <button onclick="location.reload()" class="btn btn-primary">Reset Filters</button>
      </div>
    </div>
  </section>

  <footer class="brand-header text-white text-center p-4 mt-8">
    <p>© 2026 BWE TV | <a href="#" class="hover:underline">About</a> | <a href="#" class="hover:underline">Privacy</a> | <a href="#" class="hover:underline">Contact</a></p>
    <div class="flex justify-center space-x-4 mt-2">
      <a href="#" class="hover:text-yellow-200 transition">Facebook</a>
      <a href="#" class="hover:text-yellow-200 transition">Twitter</a>
      <a href="#" class="hover:text-yellow-200 transition">YouTube</a>
      <a href="#" class="hover:text-yellow-200 transition">Instagram</a>
    </div>
  </footer>

  <script src="content.js"></script>
</body>
</html>
